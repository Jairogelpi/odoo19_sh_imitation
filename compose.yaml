services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-odoo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-odoo} -d ${POSTGRES_DB:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - odoo_net

  odoo:
    build:
      context: .
      dockerfile: odoo/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      HOST: db
      USER: ${POSTGRES_USER:-odoo}
      PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    volumes:
      - odoo-web-data:/var/lib/odoo
      - ./config:/etc/odoo:ro
      - ./addons:/mnt/extra-addons
    networks:
      - odoo_net

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - odoo
    environment:
      SERVER_NAME: ${SERVER_NAME:-_}
      ODOO_UPSTREAM: odoo:8069
      WEBSOCKET_UPSTREAM: odoo:8072
    volumes:
      - ./nginx/conf.d/odoo.conf.template:/etc/nginx/templates/default.conf.template:ro
    networks:
      - odoo_net

volumes:
  postgres-data:
  odoo-web-data:

networks:
  odoo_net:
    driver: bridge
