name: Platform CI

on:
  push:
    branches:
      - main
      - staging
      - develop
  pull_request:
    branches:
      - main
      - staging
      - develop
  workflow_dispatch:
    inputs:
      update_modules:
        description: "Comma-separated list of addons to -u (leave empty to auto-detect from diff)"
        required: false
        default: ""

permissions:
  contents: read
  packages: write

concurrency:
  group: platform-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate development compose config
        run: docker compose -f compose.yaml -f compose.dev.yaml config

      - name: Validate staging compose config
        run: docker compose -f compose.yaml -f compose.staging.yaml config

      - name: Validate production compose config
        run: docker compose -f compose.yaml -f compose.prod.yaml config

      - name: Shell syntax check critical scripts
        run: |
          bash -n ops/deploy/remote-deploy.sh
          bash -n ops/restore/restore-to-staging.sh
          bash -n backup/scripts/backup-filestore.sh
          bash -n backup/scripts/export-odoo-filestore.sh
          bash -n backup/scripts/export-pgbackrest-repo.sh
          bash -n backup/scripts/offsite-sync-rclone.sh
          bash -n backup/scripts/run-offsite-backup.sh
          bash -n pgbackrest/scripts/backup-db.sh
          bash -n pgbackrest/scripts/check-db.sh
          bash -n pgbackrest/scripts/stanza-create.sh
          bash -n nginx/scripts/configure-template.sh
          bash -n nginx/scripts/start-nginx.sh

      - name: PowerShell syntax check health scripts
        shell: pwsh
        run: |
          $errors = $null
          [void][System.Management.Automation.Language.Parser]::ParseFile("$PWD/ops/health/check-local-stack.ps1", [ref]$null, [ref]$errors)
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_ }
            exit 1
          }

          $errors = $null
          [void][System.Management.Automation.Language.Parser]::ParseFile("$PWD/ops/health/check-admin-stack.ps1", [ref]$null, [ref]$errors)
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_ }
            exit 1
          }

      - name: Run scaffold contract tests
        run: python -m unittest discover -s tests -p 'test_*.py' -v

      - name: Build PostgreSQL image
        run: docker build -t odoo19-db:test -f postgres_image/Dockerfile .

      - name: Build pgBackRest image
        run: docker build -t odoo19-pgbackrest:test -f pgbackrest/Dockerfile .

      - name: Build Odoo image
        run: docker build -t odoo19-odoo:test -f odoo/Dockerfile .

  publish_images:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: validate

    strategy:
      matrix:
        include:
          - image_name: odoo19-db
            dockerfile: postgres_image/Dockerfile
          - image_name: odoo19-pgbackrest
            dockerfile: pgbackrest/Dockerfile
          - image_name: odoo19-odoo
            dockerfile: odoo/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image reference
        id: image
        shell: bash
        env:
          IMAGE_OWNER: ${{ github.repository_owner }}
        run: |
          owner="${IMAGE_OWNER,,}"
          image="${REGISTRY}/${owner}/${{ matrix.image_name }}"
          echo "image=${image}" >> "$GITHUB_OUTPUT"

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ steps.image.outputs.image }}:${{ github.sha }}
            ${{ steps.image.outputs.image }}:${{ github.ref_name }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image_name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image_name }}

  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: publish_images
    environment: ${{ github.ref_name == 'main' && 'prod' || github.ref_name == 'staging' && 'staging' || 'dev' }}
    env:
      TARGET_ENV: ${{ github.ref_name == 'main' && 'prod' || github.ref_name == 'staging' && 'staging' || 'dev' }}
      DEPLOY_BRANCH: ${{ github.ref_name }}

    steps:
      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Configure known hosts
        shell: bash
        env:
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${DEPLOY_KNOWN_HOSTS}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy stack over SSH
        shell: bash
        env:
          IMAGE_OWNER: ${{ github.repository_owner }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_APP_DIR: ${{ secrets.DEPLOY_APP_DIR }}
          DEPLOY_ENV_FILE: ${{ secrets.DEPLOY_ENV_FILE }}
          GHCR_PULL_USERNAME: ${{ secrets.GHCR_PULL_USERNAME }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
        run: |
          deploy_port="${DEPLOY_PORT:-22}"
          owner="${IMAGE_OWNER,,}"
          odoo_image="${REGISTRY}/${owner}/odoo19-odoo:${GITHUB_SHA}"
          postgres_image="${REGISTRY}/${owner}/odoo19-db:${GITHUB_SHA}"
          pgbackrest_image="${REGISTRY}/${owner}/odoo19-pgbackrest:${GITHUB_SHA}"

          ssh -p "${deploy_port}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "TARGET_ENV='${TARGET_ENV}' DEPLOY_BRANCH='${DEPLOY_BRANCH}' APP_DIR='${DEPLOY_APP_DIR}' ENV_FILE='${DEPLOY_ENV_FILE}' GHCR_PULL_USERNAME='${GHCR_PULL_USERNAME}' GHCR_PULL_TOKEN='${GHCR_PULL_TOKEN}' ODOO_IMAGE='${odoo_image}' POSTGRES_IMAGE='${postgres_image}' PGBACKREST_IMAGE='${pgbackrest_image}' bash '${DEPLOY_APP_DIR}/ops/deploy/remote-deploy.sh'"

      - name: Detect changed addons
        id: changed
        shell: bash
        run: |
          manual="${{ github.event.inputs.update_modules || '' }}"
          if [ -n "${manual}" ]; then
            echo "modules=${manual}" >> "$GITHUB_OUTPUT"
            echo "Using manually specified modules: ${manual}"
            exit 0
          fi

          changed=$(git diff --name-only HEAD~1 HEAD -- addons/ 2>/dev/null \
            | sed -n 's|^addons/\([^/]*\)/.*|\1|p' \
            | sort -u \
            | paste -sd, -)
          echo "modules=${changed}" >> "$GITHUB_OUTPUT"
          if [ -n "${changed}" ]; then
            echo "Auto-detected changed addons: ${changed}"
          else
            echo "No addons changed in this commit."
          fi

      - name: Update changed modules on remote
        if: steps.changed.outputs.modules != ''
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_APP_DIR: ${{ secrets.DEPLOY_APP_DIR }}
          MODULES: ${{ steps.changed.outputs.modules }}
        run: |
          deploy_port="${DEPLOY_PORT:-22}"
          echo "Updating modules: ${MODULES}"
          ssh -p "${deploy_port}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "cd '${DEPLOY_APP_DIR}' && docker compose exec -T odoo odoo -u ${MODULES} -d \$(grep POSTGRES_DB .env | cut -d= -f2) --stop-after-init"

      - name: Verify deploy health endpoint
        shell: bash
        env:
          DEPLOY_HEALTHCHECK_URL: ${{ secrets.DEPLOY_HEALTHCHECK_URL }}
        run: |
          if [ -z "${DEPLOY_HEALTHCHECK_URL}" ]; then
            echo "No deploy health endpoint configured for this environment."
            exit 0
          fi

          curl --fail --show-error --silent --location "${DEPLOY_HEALTHCHECK_URL}"
