        description: Crear, duplicar y eliminar bases de datos
        server: my-docker
        container: odoo19-control-plane-1
        siteMonitor: http://control-plane:8082/healthz
    - Docs:
        icon: mdi-file-tree-outline-#2563eb
        href: http://localhost:8082/docs
