        server: my-docker
        container: odoo19-control-plane-1
        siteMonitor: http://control-plane:8082/healthz
    - Tests:
        icon: mdi-check-decagram-outline-#2563eb
        href: http://localhost:8082/tests
        description: Resultados CI por commit
        server: my-docker
        container: odoo19-control-plane-1
