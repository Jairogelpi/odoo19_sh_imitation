---
- Plataforma:
    - Odoo:
        icon: odoo.png
        href: http://localhost:8088
        description: ERP · acceso vía Nginx
        server: my-docker
        container: odoo19-odoo-1
        siteMonitor: http://nginx/healthz
    - Odoo directo:
        icon: mdi-bug-check-outline-#2563eb
        href: http://localhost:8069
        description: Bypass de Nginx para debug
        server: my-docker
        container: odoo19-odoo-1
        siteMonitor: http://odoo:8069/web/login
    - Nginx:
        icon: nginx.png
        href: http://localhost:8088
        description: Reverse proxy de la plataforma
        server: my-docker
        container: odoo19-nginx-1
        siteMonitor: http://nginx/healthz

- Operaciones:
    - Portainer:
        icon: portainer.png
        href: https://localhost:9443
        description: Gestión y logs de contenedores
        server: my-docker
        container: odoo19-portainer-1
        siteMonitor: http://portainer:9000
    - pgAdmin:
        icon: pgadmin.png
        href: http://localhost:8080
        description: Cliente web PostgreSQL
        server: my-docker
        container: odoo19-pgadmin-1
        siteMonitor: http://pgadmin:80
    - pgBackRest:
        icon: mdi-database-sync-outline-#2563eb
        href: http://localhost:8082/backups
        description: Backups WAL + full · recuperar desde UI
        server: my-docker
        container: odoo19-pgbackrest-1
        siteMonitor: http://control-plane:8082/healthz

- Control plane:
    - Backups:
        icon: mdi-backup-restore-#2563eb
        href: http://localhost:8082/backups
        description: Restaurar backups por entorno
        server: my-docker
        container: odoo19-control-plane-1
        siteMonitor: http://control-plane:8082/healthz
    - Deploys:
        icon: mdi-source-branch-check-#2563eb
