services:
  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:${STAGING_MAILPIT_UI_PORT:-8025}:8025"
    networks:
      - odoo_net

  odoo:
    ports: []
    volumes:
      - ./config/odoo.staging.conf:/etc/odoo/odoo.conf:ro

  nginx:
    environment:
      NGINX_TLS_MODE: required
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${NGINX_TLS_CERTS_DIR:-/etc/odoo/tls}:/etc/nginx/certs:ro
